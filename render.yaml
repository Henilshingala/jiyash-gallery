services:
  - type: web
    name: jiyash-gallery
    runtime: python
    rootDir: mediagallery
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py createsuperuser --noinput || true"
    startCommand: "gunicorn mediagallery.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        value: "@816n$l=)c7@wcp6tuar2&3idcuw7k(8@&b=##faw9qu6!t=n#"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "admin@123"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@jiyashgallery.com"
    autoDeploy: true
